upstream wordpress {
    server 127.0.0.1:8000
}

upstream phpmyadmin {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name store.trondealer.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name store.trondealer.com;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ecdh_curve X25519:prime256v1:secp384r1:secp521r1;
    ssl_certificate /etc/nginx/certs/server.pem;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_dhparam /etc/nginx/certs/dhparam.pem;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    ssl_session_timeout  10m;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload";
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    access_log /var/log/nginx/store-trondealer-access.log;
    error_log /var/log/nginx/store-trondealer-error.log;

    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$ ) {
        return 405;
    }

    location / {
        proxy_pass http://wordpress;
        proxy_pass_header       Set-Cookie;
        proxy_set_header        Host            $host;
        proxy_set_header        X-Real-IP       $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /phpmyadmin/ {
        proxy_pass http://phpmyadmin/;
        proxy_pass_header       Set-Cookie;
        proxy_set_header        Host            $host;
        proxy_set_header        X-Real-IP       $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /wp-login.php {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://wordpress/wp-login.php;
    }

    location /wp-admin/ {
        limit_req zone=login burst=5 nodelay;
        try_files $uri $uri/ /index.php?$args;
    }

    location ~* /wp-json/ {
        limit_req zone=api burst=30;
        try_files $uri $uri/ /index.php?$args;
    }

    location ~* /(wp-config\.php|wp-config-sample\.php|readme\.html|license\.txt|\.git|\.env|\.htaccess|\.htpasswd|\.user\.ini|php\.ini|php\.log|error_log) {
        deny all;
        access_log off;
        log_not_found off;
        return 403;
    }

    location ~ /\.ht {
        deny all;
        access_log off;
        log_not_found off;
    }

    location = /xmlrpc.php {
        deny all;
        access_log off;
        log_not_found off;
        return 403;
    }

    # Manejo de archivos estáticos con caché
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
        log_not_found off;
        try_files $uri $uri/ =404;
    }

    location ~* /wp-content/uploads/wc-logs/ {
        deny all;
        return 403;
    }

    location ~* /wp-content/plugins/woocommerce/templates/ {
        deny all;
        return 403;
    }

    if ($block_bad_bots) {
        return 403;
    }

    add_header Access-Control-Allow-Origin https://store.trondealer.com always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Allow-Credentials "true" always;

    proxy_cookie_flags ~ Secure HttpOnly SameSite=Strict;

    add_header X-Powered-By "";

    add_header Expect-CT "max-age=86400, enforce" always;
    add_header X-Permitted-Cross-Domain-Policies none always;
    add_header Permissions-Policy "geolocation=(); microphone=(); camera=(); fullscreen=(); payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    #add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://*.woocommerce.com https://*.paypal.com; frame-ancestors 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https://store.trondealer.com https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://*.woocommerce.com https://api.paypal.com https://*.stripe.com; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; media-src 'self'; worker-src blob:;" always;

}
